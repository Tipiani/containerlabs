frr version 8.4_git
frr defaults traditional
hostname router1
log syslog
no ipv6 forwarding
!
ip route 8.241.141.0/24 Null0
!
interface eth1
 ip address 192.168.12.2/30
exit
!
interface eth2
 ip address 192.168.23.1/30
exit
!
router bgp 3356
 neighbor 192.168.12.1 remote-as 263224
 neighbor 192.168.12.1 description CableVision
 neighbor 192.168.23.2 remote-as 7195
 neighbor 192.168.23.2 description Edgeuno
 !
 address-family ipv4 unicast
  network 8.241.141.0/24
  neighbor 192.168.12.1 soft-reconfiguration inbound
  neighbor 192.168.12.1 route-map TODO-IPv4-IN in
  neighbor 192.168.12.1 route-map TODO-IPv4-OUT out
  neighbor 192.168.23.2 soft-reconfiguration inbound
  neighbor 192.168.23.2 route-map TODO-IPv4-IN in
  neighbor 192.168.23.2 route-map TODO-IPv4-OUT out
 exit-address-family
exit
!
ip prefix-list PERMIT-ALL-IPv4 seq 5 permit any
!
route-map TODO-IPv4-IN permit 10
 match ip address prefix-list PERMIT-ALL-IPv4
exit
!
route-map TODO-IPv4-OUT permit 10
 match ip address prefix-list PERMIT-ALL-IPv4
exit
!
