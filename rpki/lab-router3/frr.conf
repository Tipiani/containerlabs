frr version 9.0.5
frr defaults traditional
hostname lab-router3
log syslog
log facility local7
no ipv6 forwarding
service integrated-vtysh-config
!
ip route 200.25.47.0/24 Null0
!
interface eth2
 ip address 192.168.23.2/30
exit
!
router bgp 7195
 neighbor 192.168.23.1 remote-as 3356
 neighbor 192.168.23.1 description Cirion
 !
 address-family ipv4 unicast
  network 200.25.47.0/24
  neighbor 192.168.23.1 soft-reconfiguration inbound
  neighbor 192.168.23.1 route-map TODO-IPv4-IN in
  neighbor 192.168.23.1 route-map TODO-IPv4-OUT out
 exit-address-family
exit
!
ip prefix-list PERMIT-ALL-IPv4 seq 5 permit any
!
route-map TODO-IPv4-IN permit 10
 match ip address prefix-list PERMIT-ALL-IPv4
exit
!
route-map TODO-IPv4-OUT permit 10
 match ip address prefix-list PERMIT-ALL-IPv4
exit
!
rpki
exit
!
