name: frr-rpkilab

mgmt:
  network: custom_mgmt
  ipv4-subnet: "10.100.0.16/28"

topology:
  nodes:
    lab-router1:
      kind: linux
      #image: frrouting/frr:v8.4.0
      #image: quay.io/frrouting/frr:8.4.1
      #image: rpki/rpki-client:latest
      #image: arbiza/frr:latest
      #image: frr:enhanced
      image: frr:isp
      binds:
        #- router1/daemons:/etc/frr/daemons
        - lab-router1/frr.conf:/etc/frr/frr.conf
    lab-router2:
      kind: linux
      image: frr:isp
      binds:
        #- router2/daemons:/etc/frr/daemons
        - lab-router2/frr.conf:/etc/frr/frr.conf
    lab-router3:
      kind: linux
      image: frr:isp
      binds:
        #- router3/daemons:/etc/frr/daemons
        - lab-router3/frr.conf:/etc/frr/frr.conf
  links:
    - endpoints: ["lab-router1:eth1", "lab-router2:eth1"]
    - endpoints: ["lab-router2:eth2", "lab-router3:eth2"]
